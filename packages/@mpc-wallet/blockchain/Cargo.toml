[package]
name = "mpc-wallet-blockchain"
version = "0.1.0"
edition = "2024"
authors = ["MPC Wallet Team"]
description = "Blockchain support for MPC Wallet"
license = "MIT"

[dependencies]
# FROST dependencies
frost-core = { version = "2.2.0", features = ["serde"] }
frost-secp256k1 = { version = "2.2.0", features = ["serde"] }
frost-ed25519 = { version = "2.2.0", features = ["serde"] }

# Bitcoin dependencies
bitcoin = "0.32.7"

# Ethereum dependencies  
web3 = "0.19.0"
ethers-core = { version = "2.0.14", default-features = false }
ethers-providers = "2.0.14"
elliptic-curve = "0.13.8"
k256 = "0.13.4"
hex = "0.4.3"

# Solana dependencies
solana-sdk = "4.0.1"
solana-client = "3.0.1"
spl-token = "9.0.0"
bs58 = "0.5.1"

# Common dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.143"
tokio = { version = "1.42.0", features = ["full"] }
async-trait = "0.1.83"
thiserror = "2.0.9"
anyhow = "1.0.99"
tracing = "0.1.41"
sha2 = "0.11.0"
sha3 = "0.11.0"
rand = "0.10.1"

[lib]
name = "mpc_wallet_blockchain"
path = "src/mod.rs"

[dev-dependencies]
# Dependencies for examples
tempfile = "3.8"
clap = { version = "4.5.21", features = ["derive"] }
# (bincode removed — no example references it and upstream 3.0 has a
# `compile_error!`. Re-add with a 2.0.x pin if a future example needs it.)
